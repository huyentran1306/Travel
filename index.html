
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quyết Toán Phú Yên - Công Bằng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
            background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: -1;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.4); border-radius: 10px; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        
        .gradient-primary { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-slate-900 pb-10">

    <!-- Header -->

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        
        <!-- Dashboard Summary -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">

        <!-- Bảng Phong Thần -->

    <!-- Modal Form (Toàn cục) -->

        <div class="relative bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden animate-slide-up border border-slate-100">

                <div id="participants-field" class="hidden">

    <!-- Modal Chi Tiết Cá Nhân -->

        <div class="relative bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden animate-slide-up flex flex-col max-h-[85vh] border border-slate-200">

                    <span id="detail-person-name">Chi tiết gánh kèo</span>

                </div>
                <button onclick="closeDetailsModal()" class="p-1 hover:bg-white/20 rounded-lg"><i data-lucide="x"></i></button>
            </div>
            <div id="detail-list" class="flex-1 overflow-y-auto p-5 space-y-4 custom-scrollbar bg-slate-50"></div>
            <div class="p-6 bg-white border-t flex justify-between items-center shrink-0 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">

    <!-- Modal Custom Alert -->

        <div class="relative bg-white w-full max-w-md rounded-[2rem] shadow-2xl p-6 text-center animate-slide-up border border-slate-100">
            <div class="w-14 h-14 bg-amber-50 rounded-full flex items-center justify-center text-amber-500 mx-auto mb-4">
                <i data-lucide="alert-triangle" class="w-7 h-7"></i>
            </div>
            <h3 id="custom-alert-title" class="text-base font-black text-slate-800 mb-2">Thông báo</h3>
            <p id="custom-alert-message" class="text-xs text-slate-500 leading-relaxed mb-6 whitespace-pre-line text-left max-h-[40vh] overflow-y-auto custom-scrollbar p-1"></p>
            <button onclick="closeCustomAlert()" class="w-full py-3.5 bg-slate-800 text-white font-black rounded-2xl active:scale-95 transition-all text-sm tracking-wide uppercase">Đóng</button>
        </div>
    </div>

    <!-- Modal Custom Confirm -->
    <div id="custom-confirm-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeCustomConfirm()"></div>
        <div class="relative bg-white w-full max-w-md rounded-[2rem] shadow-2xl p-6 text-center animate-slide-up border border-slate-100">
            <div class="w-14 h-14 bg-sky-50 rounded-full flex items-center justify-center text-sky-500 mx-auto mb-4" id="custom-confirm-icon-bg">
                <i id="custom-confirm-icon" data-lucide="help-circle" class="w-7 h-7"></i>
            </div>
            <h3 id="custom-confirm-title" class="text-base font-black text-slate-800 mb-2">Xác nhận</h3>
            <p id="custom-confirm-message" class="text-xs text-slate-500 leading-relaxed mb-6 whitespace-pre-line text-left"></p>
            <div class="flex gap-3">
                <button onclick="closeCustomConfirm()" class="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-650 font-bold rounded-2xl active:scale-95 transition-all text-sm uppercase border border-slate-200">Hủy</button>
                <button id="custom-confirm-btn-ok" class="flex-1 py-3.5 bg-indigo-500 hover:bg-indigo-600 text-white font-black rounded-2xl active:scale-95 transition-all text-sm uppercase shadow-lg shadow-indigo-100">Đồng ý</button>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình Supabase
        const SUPABASE_URL = 'https://cfiifhfruyjcgikjotne.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_DD6l7mKVEkHXIEG-1r7KDg_CbrfVdWA'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let entries = [];
        
        const modal = document.getElementById('modal');
        const entryForm = document.getElementById('entry-form');
        const loading = document.getElementById('loading');

        // TRÌNH THAY THẾ CHẮC CHẮN CHO ALERT VÀ CONFIRM TRÊN IFRAME
        let customConfirmCallback = null;

        function showAlert(title, message) {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-message').innerText = message;
            document.getElementById('custom-alert-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeCustomAlert() {
            document.getElementById('custom-alert-modal').classList.add('hidden');
        }

        function showConfirm(title, message, onConfirm, isDangerous = false) {
            document.getElementById('custom-confirm-title').innerText = title;
            document.getElementById('custom-confirm-message').innerText = message;
            
            const iconBg = document.getElementById('custom-confirm-icon-bg');
            const icon = document.getElementById('custom-confirm-icon');
            const okBtn = document.getElementById('custom-confirm-btn-ok');

            if (isDangerous) {
                iconBg.className = "w-14 h-14 bg-rose-50 rounded-full flex items-center justify-center text-rose-500 mx-auto mb-4";
                icon.setAttribute('data-lucide', 'trash-2');
                okBtn.className = "flex-1 py-3.5 bg-rose-500 hover:bg-rose-600 text-white font-black rounded-2xl active:scale-95 transition-all text-sm uppercase shadow-lg shadow-rose-100";
            } else {
                iconBg.className = "w-14 h-14 bg-sky-50 rounded-full flex items-center justify-center text-sky-500 mx-auto mb-4";
                icon.setAttribute('data-lucide', 'help-circle');
                okBtn.className = "flex-1 py-3.5 bg-indigo-500 hover:bg-indigo-600 text-white font-black rounded-2xl active:scale-95 transition-all text-sm uppercase shadow-lg shadow-indigo-100";
            }

            customConfirmCallback = onConfirm;
            document.getElementById('custom-confirm-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeCustomConfirm() {
            document.getElementById('custom-confirm-modal').classList.add('hidden');
            customConfirmCallback = null;
        }

        // Đăng ký sự kiện click cho nút xác nhận OK
        document.getElementById('custom-confirm-btn-ok').onclick = () => {
            if (customConfirmCallback) {
                customConfirmCallback();
            }
            closeCustomConfirm();
        };

        function toggleLoading(show) { loading.classList.toggle('hidden', !show); }
        function formatMoney(amount) { return Math.round(Number(amount) || 0).toLocaleString('vi-VN') + ' đ'; }

        async function fetchData() {
            toggleLoading(true);
            try {
                const { data, error } = await _supabase.from('travel_entries').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                entries = data || [];
                render();
            } catch (err) { console.error('Lỗi tải dữ liệu:', err); }
            finally { toggleLoading(false); }
        }

        // HÀM XÓA - SỬA LẠI ĐỂ HOẠT ĐỘNG CHẮC CHẮN HƠN VÀ CHẨN ĐOÁN RLS CHÍNH XÁC
        async function deleteEntry(id) {
            if (!id) {
                showAlert('⚠️ Lỗi ID', 'Mục này không có ID hợp lệ. Hãy thử tải lại trang (F5 hoặc bấm nút Đổi mới dữ liệu) trước khi xóa.');
                return;
            }
            showConfirm('Xác nhận xóa?', 'Bạn có chắc chắn muốn xóa mục này khỏi hệ thống không?', async () => {
                toggleLoading(true);
                try {
                    // Sử dụng .select() để biết có thực sự xóa được dòng nào hay không
                    const { data, error } = await _supabase.from('travel_entries').delete().eq('id', id).select();
                    if (error) throw error;
                    
                    // Nếu Supabase không báo lỗi nhưng mảng dữ liệu trả về rỗng, chứng tỏ RLS đang chặn quyền Quyết định DELETE
                    if (!data || data.length === 0) {
                        showAlert('⚠️ Không thể xóa mục này!', 
                              'Nguyên nhân: Bảng "travel_entries" của bạn trên Supabase đang bật Row Level Security (RLS) nhưng BẠN CHƯA CHO PHÉP QUYỀN XÓA (DELETE Policy).\n\n' +
                              'Cách khắc phục cực kỳ đơn giản:\n' +
                              '1. Vào Supabase Dashboard trang của bạn.\n' +
                              '2. Đi tới phần "Database" -> "Policies" (ở thanh dọc bên trái).\n' +
                              '3. Nhấp "New Policy" tại bảng "travel_entries" -> Chọn "Create a policy from scratch" (để tùy chỉnh).\n' +
                              '4. Nhập thông tin sau:\n' +
                              '   • Policy name: Allow delete access for all\n' +
                              '   • Allowed operations: DELETE\n' +
                              '   • Target roles: public (hoặc anon)\n' +
                              '   • USING expression: true\n' +
                              '5. Nhấp "Save policy" ở dưới góc phải là xong xuôi!');
                        return;
                    }
                    
                    // Xóa tại chỗ để phản hồi nhanh
                    entries = entries.filter(e => e.id !== id);
                    render();
                } catch (err) {
                    showAlert('⚠️ Lỗi Cloud', 'Lỗi khi xóa từ Cloud: ' + err.message);
                    fetchData(); // Tải lại nếu lỗi
                } finally {
                    toggleLoading(false);
                }
            }, true);
        }

        // Xem chi tiết gánh kèo
        function showPersonDetails(name) {
            const detailModal = document.getElementById('modal-details');
            const nameEl = document.getElementById('detail-person-name');
            const listEl = document.getElementById('detail-list');
            const totalEl = document.getElementById('detail-total-owed');
            
            nameEl.innerText = 'Bảng chi của: ' + name;
            listEl.innerHTML = '';
            
            let totalOwed = 0;
            const mySpent = entries.filter(e => {
                if (e.type !== 'SPENT') return false;
                const pList = e.participants ? e.participants.split(',') : getUniquePeople();
                return pList.includes(name);
            });

            if (mySpent.length === 0) {
                listEl.innerHTML = '<div class="p-10 text-center text-slate-400 italic">Chưa gánh kèo nào cả. Đại gia!</div>';
            } else {
                mySpent.forEach(e => {
                    const pList = e.participants ? e.participants.split(',') : getUniquePeople();
                    const share = e.amount / (pList.length || 1);
                    totalOwed += share;
                    
                    const item = document.createElement('div');
                    item.className = 'p-5 bg-white border border-slate-200 rounded-2xl shadow-sm flex flex-col gap-2 animate-slide-up';
                    item.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-slate-800 text-sm">${e.content}</span>
                            <span class="font-black text-rose-500">${formatMoney(share)}</span>
                        </div>
                        <div class="flex justify-between items-center text-[9px] text-slate-400 uppercase font-black">
                            <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-2.5 h-2.5"></i> ${e.date || '---'}</span>
                            <span>Kèo: ${formatMoney(e.amount)} (/${pList.length} người)</span>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            }
            
            totalEl.innerText = formatMoney(totalOwed);
            detailModal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeDetailsModal() { document.getElementById('modal-details').classList.add('hidden'); }

        function handleAmountInput(input) {
            let val = input.value.replace(/[^0-9]/g, '');
            input.value = val ? parseInt(val).toLocaleString('en-US') : '';
        }

        function getUniquePeople() { 
            return [...new Set(entries.filter(e => e.type === 'INCOME').map(e => e.content))]; 
        }

        function openModal(type) {
            document.getElementById('entry-type').value = type;
            document.getElementById('entry-is-quick').value = 'false';
            document.getElementById('names-field').classList.add('hidden');
            document.getElementById('content-field').classList.remove('hidden');
            
            document.getElementById('modal-title').innerText = type === 'SPENT' ? 'Ghi nhận chi tiêu' : (type === 'INCOME' ? 'Nộp thêm quỹ' : 'Kế hoạch dự kiến');
            document.getElementById('modal-header').className = `p-6 text-white font-black text-lg flex justify-between items-center ${type === 'SPENT' ? 'bg-rose-500' : (type === 'INCOME' ? 'bg-emerald-500' : 'bg-sky-500')}`;
            
            document.getElementById('participants-field').classList.toggle('hidden', type !== 'SPENT');
            if (type === 'SPENT') {
                const container = document.getElementById('participants-list-container');
                container.innerHTML = '';
                const people = getUniquePeople();
                if (people.length === 0) {
                    container.innerHTML = '<p class="text-[10px] text-slate-400 italic p-2 col-span-2">Cần nộp quỹ để có danh sách thành viên</p>';
                } else {
                    people.forEach(p => {
                        container.innerHTML += `
                            <label class="flex items-center gap-2 p-3 bg-white border border-slate-50 rounded-xl cursor-pointer hover:border-sky-300 transition-all">
                                <input type="checkbox" value="${p}" class="w-5 h-5 rounded border-slate-300 text-sky-600" checked>
                                <span class="text-xs font-bold text-slate-600 truncate">${p}</span>
                            </label>
                        `;
                    });
                }
            }
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function openQuickFundModal() {
            openModal('INCOME');
            document.getElementById('entry-is-quick').value = 'true';
            document.getElementById('names-field').classList.remove('hidden');
            document.getElementById('content-field').classList.add('hidden');
            document.getElementById('modal-title').innerText = 'Nộp quỹ đồng loạt';
        }

        function closeModal() {
            modal.classList.add('hidden');
            entryForm.reset();
        }

        entryForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Đang gửi...";
            toggleLoading(true);

            const type = document.getElementById('entry-type').value;
            const isQuick = document.getElementById('entry-is-quick').value === 'true';
            const amount = parseFloat(document.getElementById('amount').value.replace(/,/g, '')) || 0;
            const date = document.getElementById('date').value;

            try {
                let rows = [];
                if (isQuick) {
                    const names = document.getElementById('names-list').value.split(',').map(n => n.trim()).filter(n => n);
                    if (names.length === 0) throw new Error("Chưa nhập tên ai cả!");
                    names.forEach(name => rows.push({ type: 'INCOME', content: name, amount, date }));
                } else {
                    let parts = null;
                    if (type === 'SPENT') {
                        const checks = document.querySelectorAll('#participants-list-container input:checked');
                        parts = Array.from(checks).map(c => c.value).join(',');
                        if (!parts && getUniquePeople().length > 0) throw new Error("Chọn ít nhất 1 người tham gia!");
                    }
                    const content = document.getElementById('content').value;
                    if (!content) throw new Error("Nhập nội dung đã!");
                    rows.push({ type, content, amount, date, participants: parts });
                }
                const { error } = await _supabase.from('travel_entries').insert(rows);
                if (error) throw error;
                closeModal();
                await fetchData();
            } catch (err) { showAlert('⚠️ Có lỗi xảy ra', 'Hic: ' + err.message); }
            finally { 
                btn.disabled = false;
                btn.innerText = "Lưu vào Cloud";
                toggleLoading(false); 
            }
        };

        async function clearAllData() {
            showConfirm('Cảnh báo nguy hiểm!', 'Bạn có chắc chắn muốn xóa sạch TOÀN BỘ dữ liệu trên Cloud? Thao tác này KHÔNG thể hoàn tác!', async () => {
                toggleLoading(true);
                try {
                    const { data, error } = await _supabase.from('travel_entries').delete().neq('type', 'SYSTEM_RESERVED').select();
                    if (error) throw error;
                    
                    if (!data || data.length === 0) {
                        showAlert('⚠️ Không thể reset dữ liệu!', 
                              'Nguyên nhân: Bảng "travel_entries" của bạn đang được bật RLS (Row Level Security) nhưng BẠN CHƯA CHO PHÉP QUYỀN XÓA (DELETE Policy cho role "anon").\n\n' +
                              'Vui lòng làm theo hướng dẫn cài đặt DELETE Policy cho vai trò "anon" trên trang chủ Supabase Dashboard nhé!');
                        return;
                    }
                    
                    await fetchData();
                } catch (err) { showAlert('⚠️ Lỗi xóa dữ liệu', 'Lỗi xóa: ' + err.message); }
                finally { toggleLoading(false); }
            }, true);
        }

        function render() {
            const uniquePeople = getUniquePeople();
            const personStats = {};
            uniquePeople.forEach(p => personStats[p] = { paid: 0, owed: 0 });

            let totalSpent = 0, totalIncome = 0, totalPlanned = 0;
            const lists = { SPENT: document.getElementById('list-spent'), INCOME: document.getElementById('list-income'), PLANNED: document.getElementById('list-planned') };
            Object.values(lists).forEach(l => l.innerHTML = '');

            entries.forEach(e => {
                const amt = Number(e.amount) || 0;
                if (e.type === 'SPENT') {
                    totalSpent += amt;
                    const pList = e.participants ? e.participants.split(',') : uniquePeople;
                    const share = amt / (pList.length || 1);
                    pList.forEach(p => { if(personStats[p]) personStats[p].owed += share; });
                } else if (e.type === 'INCOME') {
                    totalIncome += amt;
                    if(personStats[e.content]) personStats[e.content].paid += amt;
                } else if (e.type === 'PLANNED') {
                    totalPlanned += amt;
                }

                // Render danh sách
                const item = document.createElement('div');
                item.className = 'px-4 py-4 border-b border-slate-100 flex justify-between items-center bg-white/50 animate-slide-up group';
                
                const info = document.createElement('div');
                info.className = 'flex-1 min-w-0';
                info.innerHTML = `
                    <p class="text-[13px] font-bold text-slate-800 truncate">${e.content || '...'}</p>
                    <p class="text-[9px] text-slate-400 font-black uppercase flex items-center gap-1 mt-0.5"><i data-lucide="clock" class="w-2.5 h-2.5"></i> ${e.date || ''}</p>
                `;

                const actions = document.createElement('div');
                actions.className = 'flex items-center gap-3';
                
                const amountSpan = document.createElement('span');
                amountSpan.className = 'text-[13px] font-black text-slate-900';
                amountSpan.innerText = formatMoney(amt);
                
                const delBtn = document.createElement('button');
                delBtn.className = 'w-8 h-8 flex items-center justify-center text-red-200 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all';
                delBtn.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';
                delBtn.onclick = () => deleteEntry(e.id);

                actions.appendChild(amountSpan);
                actions.appendChild(delBtn);
                
                item.appendChild(info);
                item.appendChild(actions);
                lists[e.type]?.appendChild(item);
            });

            // Render Bảng Phong Thần
            const balances = document.getElementById('individual-balances');
            balances.innerHTML = '';
            if (uniquePeople.length === 0) {
                balances.innerHTML = '<div class="col-span-full p-10 text-center text-slate-400 italic text-sm">Chưa có ai nộp quỹ cả...</div>';
            } else {
                uniquePeople.sort().forEach(name => {
                    const s = personStats[name];
                    const diff = s.paid - s.owed;
                    const card = document.createElement('div');
                    card.className = `glass-card p-5 rounded-3xl border-2 transition-all animate-slide-up ${diff >= 0 ? 'border-emerald-100' : 'border-rose-100'}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <span class="font-black text-slate-800 text-base truncate max-w-[120px]">${name}</span>
                            <span class="px-2 py-1 rounded-lg text-[8px] font-black uppercase ${diff >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">${diff >= 0 ? 'Tiền dư' : 'Cần bù'}</span>
                        </div>
                        <div class="space-y-3 mb-4">
                            <div class="flex justify-between items-center text-[10px] font-bold">
                                <span class="text-slate-400">Đã nộp:</span>
                                <span class="text-emerald-600">${formatMoney(s.paid)}</span>
                            </div>
                            <div class="flex flex-col gap-1 p-2 bg-slate-50 rounded-xl border border-slate-100">
                                <div class="flex justify-between items-center text-[10px] font-bold">
                                    <span class="text-slate-400">Gánh kèo:</span>
                                    <span class="text-rose-500">${formatMoney(s.owed)}</span>
                                </div>
                                <button onclick="showPersonDetails('${name}')" class="w-full mt-1 py-1.5 bg-white text-[9px] font-black text-indigo-500 rounded-lg border border-indigo-100 flex items-center justify-center gap-1 hover:bg-indigo-500 hover:text-white transition-all uppercase">
                                    <i data-lucide="list-checks" class="w-3 h-3"></i> Xem chi tiết
                                </button>
                            </div>
                        </div>
                        <div class="pt-3 border-t border-dashed border-slate-200 flex justify-between items-center">
                            <span class="text-[9px] font-black text-slate-400 uppercase">Còn lại</span>
                            <span class="text-xl font-black ${diff >= 0 ? 'text-emerald-600' : 'text-rose-600'}">${formatMoney(Math.abs(diff))}</span>
                        </div>
                    `;
                    balances.appendChild(card);
                });
            }

            // Summary
            document.getElementById('total-spent').innerText = formatMoney(totalSpent);
            document.getElementById('total-income').innerText = formatMoney(totalIncome);
            document.getElementById('people-count-display').innerText = uniquePeople.length;
            document.getElementById('planned-per-person').innerText = formatMoney(totalPlanned / (uniquePeople.length || 1));
            lucide.createIcons();
        }

        // Khởi chạy lần đầu
        fetchData();
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
